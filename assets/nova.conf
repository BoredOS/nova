[autostart]
# Extensible autostart entries for Nova compositor
# Any key may be used as a label; the value is a simple command line.
respawn = true
taskbar = /bin/taskbar.elf
wallpaperd = /bin/wallpaperd.elf
# keymap = loadkeys fr
# keymap.respawn = false

[keyboard]
layout = fr

[theme]
active_titlebar_top = #393939
active_titlebar_bottom = #727272
inactive_titlebar_top = #1F1E1E
inactive_titlebar_bottom = #3C3C3C
active_border = #393939
inactive_border = #3C3C3C
border_width = 1
titlebar_height = 26
panel_bg = #2d2d2d
desktop_bg = #2d2d2d
panel_border = #4D4D4D
border_radius = 8
text_primary = #EEEEEE
text_dim = #A6ADC8
text_error = #FF8A8A
font_path = /Library/Fonts/inter.ttf
font_size = 14

# Accent color (used for slider tracks, checkbox active states, slider thumbs, textinput border focus)
accent_color = #FFAAAA

widget_radius_button = 6
widget_radius_input = 4
widget_radius_panel = 8
widget_radius_progress = 4

# Horizontal inner padding for buttons and text inputs
widget_padding = 6

# Optional Explicit Widget Color Overrides (leave empty or comment out to derive dynamically from panel_bg)
# widget_bg = #242424
# widget_bg_hover = #404040
# widget_bg_active = #729FCF
