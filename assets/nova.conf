[autostart]
# Extensible autostart entries for Nova compositor
# Any key may be used as a label; the value is a simple command line.
respawn = true
taskbar = /bin/taskbar.elf
wallpaperd = /bin/wallpaperd.elf
# keymap = loadkeys fr
# keymap.respawn = false

[keyboard]
layout = en

[theme]
window_bg = #B0B0B0
panel_bg = #B0B0B0
accent = #000080
text_primary = #000000
titlebar_active_start = #00007B
titlebar_active_end = #1C94D4
titlebar_inactive_start = #808080
titlebar_inactive_end = #A0A0A0
border_radius = 0
titlebar_height = 20
font_path = /Library/Fonts/Proggy.ttf
font_size = 14

widget_radius_button = 0
widget_radius_input = 0
widget_radius_panel = 0
widget_radius_progress = 0

# Horizontal inner padding for buttons and text inputs
widget_padding = 6

# Optional Explicit Widget Color Overrides (leave empty or comment out to derive dynamically from panel_bg)
# widget_bg = #242424
# widget_bg_hover = #404040
# widget_bg_active = #729FCF
