[taskbar]
# position: top or bottom
position = bottom

# logo_path: path to the start button logo image
logo_path = /Library/images/icons/bos.png

# date_format: strftime-compatible format string
date_format = %Y-%m-%d

# active_tab_color: background color for the focused application tab
# inactive_tab_color: background color for unfocused application tabs
# Colors may be specified as #RRGGBB or RRGGBBAA hex values.
active_tab_color = #B0B0B0
inactive_tab_color = #B0B0B0

# clock_format: 12h or 24h clock display
clock_format = 24h

# gradient_top_color: hex color for the top of the taskbar gradient
gradient_top_color = #B0B0B0

# gradient_bottom_color: hex color for the bottom of the taskbar gradient
gradient_bottom_color = #B0B0B0

# taskbar_border_color: hex color for the taskbar top/bottom border line.
taskbar_border_color = #B0B0B0

# launcher_bg_color: hex color for the launcher/start menu background.
launcher_bg_color = #B0B0B0

# launcher_border_color: hex color for the launcher/start menu border.
launcher_border_color = #B0B0B0

# launcher_search_bg_color: hex color for the search bar background in the launcher.
launcher_search_bg_color = #FFFFFF

# launcher_selected_bg_color: hex color for the selected application background inside the launcher list.
launcher_selected_bg_color = #000080

# taskbar_button_bg_color: hex color for all taskbar application buttons.
taskbar_button_bg_color = #B0B0B0



